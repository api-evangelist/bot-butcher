      - AI Classification
      - Contact Forms
    humanURL: https://botbutcher.com/
    properties:
      - url: https://botbutcher.com/
        type: Documentation
    description: >-
      Submit contact form data to Bot Butcher and receive a JSON classification
      result indicating whether the message is spam or legitimate. The AI model
      classifies each message within the context of your specific website,
      delivering context-aware spam detection for multi-tenant and enterprise
      applications.
